# Локальная сборка: cp docker-compose.override.yml.dist docker-compose.override.yml && docker compose up -d --build
services:
  frontend:
    image: itmo508541/sausage-frontend:latest
    ports:
      - "80:80"
    networks:
      - backend
    configs:
      - source: default.conf
        target: /etc/nginx/conf.d/default.conf

  backend:
    image: itmo508541/sausage-backend:latest
    expose:
      - "8080"
    networks:
      - backend
    depends_on:
      - postgresql
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://${POSTGRES_HOST}:5432/${POSTGRES_DB}"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

  postgresql:
    image: postgres:16
    ports:
      - "5432:5432"
    networks:
      - backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  backend-report:
    image: itmo508541/sausage-backend-report:latest
    environment:
      - PORT=8080
      - DB=mongodb://mongo:27017/sausage-store
    expose:
      - "8080"
    networks:
      - backend

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    networks:
      - backend

networks:
  backend:

configs:
  default.conf:
    file: docker-compose.default.conf
