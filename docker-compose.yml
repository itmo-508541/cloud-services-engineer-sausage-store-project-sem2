services:
  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - backend
    configs:
      - source: default.conf
        target: /etc/nginx/conf.d/default.conf

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
      args:
        VERSION: 1.0.0
    expose:
      - "8080"
    networks:
      - backend

  backend-report:
    build:
      context: ./backend-report/
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - DB=mongodb://mongo:27017/sausage-store
    expose:
      - "8080"
    networks:
      - backend

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    networks:
      - backend

networks:
  backend:

configs:
  default.conf:
    file: docker-compose.default.conf
