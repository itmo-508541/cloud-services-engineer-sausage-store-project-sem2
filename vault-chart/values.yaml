replicaCount: 1

image:
  repository: hashicorp/vault
  tag: "1.21.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8200
  targetPort: 8200

persistence:
  size: 512Mi
  storageClass: "yc-network-hdd"
  accessMode: ReadWriteOnce
  mountPath: /vault/data

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

config: |
  ui = true
  disable_mlock = true

  listener "tcp" {
    tls_disable = 1
    address = "[::]:8200"
    cluster_address = "[::]:8201"
  }

  storage "file" {
    path = "/vault/data"
  }
