---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
spec:
  # replicas: {{ .Values.replicas }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "selector.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "template.metadata.labels" . | nindent 8 }}
    spec:
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -e
              vault status
              printf 'DB="mongodb://%s:%s@%s:%s/%s"\n' \
                "$(vault kv get -mount=kv -field=spring.data.mongodb.username sausage-store)" \
                "$(vault kv get -mount=kv -field=spring.data.mongodb.password sausage-store)" \
                "$(vault kv get -mount=kv -field=spring.data.mongodb.host sausage-store)" \
                "$(vault kv get -mount=kv -field=spring.data.mongodb.port sausage-store)" \
                "$(vault kv get -mount=kv -field=spring.data.mongodb.database sausage-store)" \
                > {{ .Values.global.secrets }}/env
          {{- include "vault.init.container" . | nindent 10 }}
      containers:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.containerPort }}
              name: http
          readinessProbe:
            httpGet:
              path: {{ .Values.health }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.health }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-{{ .Chart.Name }}-conf
                  key: port
          {{- with .Values.resources.container }}
          resources:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: vault-secrets
              mountPath: {{ .Values.global.secrets }}
              readOnly: true
      volumes:
        - name: vault-secrets
          emptyDir: {}
