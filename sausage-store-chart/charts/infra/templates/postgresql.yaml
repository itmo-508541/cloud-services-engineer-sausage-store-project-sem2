---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "selector.labels" . | nindent 6 }}
      app.kubernetes.io/component: postgresql
  template:
    metadata:
      labels:
        {{- include "template.metadata.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql
    spec:
      initContainers:
        - command:
            - sh
            - -c
            - |
              set -e
              vault status
              vault kv get -mount=kv -field=spring.datasource.username sausage-store > {{ .Values.global.secrets }}/postgres-username
              vault kv get -mount=kv -field=spring.datasource.password sausage-store > {{ .Values.global.secrets }}/postgres-password
              vault kv get -mount=kv -field=postgresql.init.database sausage-store > {{ .Values.global.secrets }}/postgres-database
          {{- include "vault.init.container" . | nindent 10 }}
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: POSTGRES_PASSWORD_FILE
              value: {{ .Values.global.secrets }}/postgres-password
            - name: POSTGRES_USER_FILE
              value: {{ .Values.global.secrets }}/postgres-username
            - name: POSTGRES_DB_FILE
              value: {{ .Values.global.secrets }}/postgres-database
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: {{ .Values.postgresql.containerPort }}
          {{- with .Values.postgresql.resources.container }}
          resources:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: postgresql-data
              mountPath: /var/lib/postgresql/data
            - name: vault-secrets
              mountPath: {{ .Values.global.secrets }}
              readOnly: true
      volumes:
        - name: vault-secrets
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: postgresql-data
        namespace: {{ .Release.Namespace }}
        labels:
          {{- include "metadata.labels" . | nindent 10 }}
          app.kubernetes.io/component: postgresql
      spec:
        accessModes: [ "ReadWriteOnce" ]
        {{- with .Values.postgresql.resources.data }}
        resources:
          {{ toYaml . | nindent 10 }}
        {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  ports:
    - port: {{ .Values.postgresql.containerPort }}
      targetPort: {{ .Values.postgresql.containerPort }}
  selector:
    {{- include "selector.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  clusterIP: None
