---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicas }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "selector.labels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/path: {{ .Values.annotations.path }}
        prometheus.io/port: "{{ .Values.annotations.port }}"
        prometheus.io/scrape: "{{ .Values.annotations.scrape }}"
      labels:
        {{- include "template.metadata.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: SPRING_CONFIG_IMPORT
              value: {{ .Values.global.vault.spring.import | quote }}
            - name: SPRING_CLOUD_VAULT_KV_ENABLED
              value: "true"
            - name: SPRING_CLOUD_VAULT_URI
              value: {{ .Values.global.vault.addr | quote }}
            - name: SPRING_CLOUD_VAULT_AUTHENTICATION
              value: "TOKEN"
            - name: SPRING_CLOUD_VAULT_TOKEN
              value: {{ .Values.global.vault.token | quote }}
            - name: REPORT_PATH
              value: {{ .Values.env.reportPath }}
          {{- with .Values.resources.container }}
          resources:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: {{ .Chart.Name }}
              containerPort: {{ .Values.containerPort }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: {{ .Values.env.reportPath }}
              name: {{ .Release.Name }}-{{ .Chart.Name }}-reports
      volumes:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-reports
          emptyDir:
            sizeLimit: 256Mi
