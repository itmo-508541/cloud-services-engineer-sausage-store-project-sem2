---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: {{ .Chart.Name }}
    app.kubernetes.io/part-of: {{ .Release.Name }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicas }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}
  template:
    metadata:
      annotations:
        prometheus.io/path: {{ .Values.annotations.path }}
        prometheus.io/port: "{{ .Values.annotations.port }}"
        prometheus.io/scrape: "{{ .Values.annotations.scrape }}"
      labels:
        app: {{ .Release.Name }}-{{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: SPRING_CONFIG_IMPORT
              value: {{ .Values.global.vault.spring.import | quote }}
            - name: SPRING_CLOUD_VAULT_ENABLED
              value: "true"
            - name: SPRING_CLOUD_VAULT_URI
              value: {{ .Values.global.vault.addr | quote }}
            - name: SPRING_CLOUD_VAULT_TOKEN
              value: {{ .Values.global.vault.token | quote }}
            - name: REPORT_PATH
              value: {{ .Values.env.reportPath }}
          {{- with .Values.resources.container }}
          resources:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: {{ .Chart.Name }}
              containerPort: {{ .Values.containerPort }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: {{ .Values.env.reportPath }}
              name: {{ .Release.Name }}-{{ .Chart.Name }}-reports
      volumes:
        - name: {{ .Release.Name }}-{{ .Chart.Name }}-reports
          emptyDir:
            sizeLimit: 256Mi

---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-vpa
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: {{ .Release.Name }}-{{ .Chart.Name }}
  {{- with .Values.vpa }}
  updatePolicy:
    {{ toYaml .updatePolicy | nindent 4 }}
  resourcePolicy:
    {{ toYaml .resourcePolicy | nindent 4 }}
  {{- end }}
