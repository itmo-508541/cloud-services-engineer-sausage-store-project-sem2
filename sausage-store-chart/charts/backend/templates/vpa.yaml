---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-vpa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: {{ .Release.Name }}-{{ .Chart.Name }}
  {{- with .Values.vpa }}
  updatePolicy:
    {{ toYaml .updatePolicy | nindent 4 }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ $.Release.Name }}-{{ $.Chart.Name }}
        {{ toYaml .containerPolicy | nindent 8 }}
  {{- end }}
